<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meals On Wheels Partner App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="rk-app.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script defer src="rk-common.js"></script>
</head>
<body>
  <main class="main stack">
    <div class="tabs">
      <button class="tab-btn" data-tab="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</button>
      <button class="tab-btn" data-tab="enlist"><i data-lucide="clipboard-list"></i> Vendor Enlistment</button>
      <button class="tab-btn" data-tab="catalog"><i data-lucide="utensils"></i> Catalog Request</button>
      <button class="tab-btn" data-tab="status"><i data-lucide="activity"></i> Request Status</button>
    </div>

    <section class="panel pad stack" data-tab-panel="dashboard">
      <div class="row mobile-stack">
        <label class="field grow"><span>Partner Phone</span><input class="input" id="dashboardPhone" inputmode="tel"></label>
        <button class="btn secondary" id="loadDashboardBtn"><i data-lucide="search"></i> Load Dashboard</button>
      </div>
      <div id="partnerDashboardMetrics" class="grid four"></div>
      <div id="partnerDashboardList" class="list"></div>
    </section>

    <section class="panel pad stack hidden" data-tab-panel="enlist">
      <div class="section-title"><div><h2>Partner Vendor Enlistment</h2><p>Restaurant details will go to Control Tower for approval.</p></div></div>
      <form id="partnerForm" class="stack">
        <div class="grid two">
          <label class="field"><span>Restaurant Name</span><input class="input" name="restaurantName" required></label>
          <label class="field"><span>Nearest Station</span><input class="input" name="station" required placeholder="Station name / code"></label>
          <label class="field"><span>Owner / Manager</span><input class="input" name="ownerName" required></label>
          <label class="field"><span>Phone</span><input class="input" name="phone" required inputmode="tel"></label>
          <label class="field"><span>Email</span><input class="input" name="email" type="email"></label>
          <label class="field"><span>FSSAI / License No</span><input class="input" name="licenseNo"></label>
        </div>
        <label class="field"><span>Full Address</span><textarea class="textarea" name="address" required></textarea></label>
        <button class="btn" type="submit"><i data-lucide="send"></i> Submit for Approval</button>
      </form>
    </section>

    <section class="panel pad stack hidden" data-tab-panel="catalog">
      <div class="section-title"><div><h2>Partner Food Catalog</h2><p>Approved by Control Tower before it appears in passenger menu.</p></div></div>
      <form id="catalogForm" class="stack">
        <div class="grid two">
          <label class="field"><span>Partner Phone</span><input class="input" name="partnerPhone" required inputmode="tel"></label>
          <label class="field"><span>Item Name</span><input class="input" name="name" required></label>
          <label class="field"><span>Meal Categories</span><div id="partnerMealSlots" class="check-grid"></div></label>
          <label class="field"><span>Food Type</span><select class="select" name="type"><option>veg</option><option>non-veg</option><option>beverage</option><option>other</option></select></label>
          <label class="field"><span>Cuisine</span><select class="select" name="cuisine" id="partnerCuisine"></select></label>
          <label class="field"><span>Selling Rate</span><input class="input" name="sellingPrice" type="number" min="0" required></label>
          <label class="field"><span>Cost incl. packaging</span><input class="input" name="costPrice" type="number" min="0" required></label>
          <label class="field"><span>Opening Qty</span><input class="input" name="stockQty" type="number" min="0" value="0"></label>
          <label class="field"><span>Linked Train</span><input class="input" name="linkedTrain" placeholder="12859 / 12860 / All"></label>
          <label class="field"><span>Food Image</span><input class="input" name="itemImageFile" type="file" accept="image/*"></label>
        </div>
        <label class="field"><span>Product Detail</span><textarea class="textarea" name="description" placeholder="Ingredients, packing, serving size"></textarea></label>
        <button class="btn" type="submit"><i data-lucide="send"></i> Send to Control Tower</button>
      </form>
    </section>

    <section class="panel pad stack hidden" data-tab-panel="status">
      <div class="row mobile-stack">
        <label class="field grow"><span>Phone</span><input class="input" id="statusPhone" inputmode="tel"></label>
        <button class="btn secondary" id="loadStatusBtn"><i data-lucide="search"></i> Search</button>
        <button class="btn danger" id="switchOffPartnerBtn"><i data-lucide="power"></i> Switch Off Service</button>
      </div>
      <div id="statusList" class="list"></div>
    </section>
  </main>

  <script>
    window.addEventListener("DOMContentLoaded", async () => {
      appHeader("Meals On Wheels Partner App", "Restaurant enlistment and food catalog submission");
      lucide.createIcons();
      wireTabs("dashboard");
      await ensureSeedData();
      $("partnerMealSlots").innerHTML = mealSlots.map((slot, idx) => `<label class="check-pill"><input type="checkbox" name="mealSlots" value="${escapeHtml(slot)}" ${idx === 0 ? "checked" : ""}> ${escapeHtml(slot)}</label>`).join("");
      $("partnerCuisine").innerHTML = cuisineOptions.map((cuisine) => `<option>${cuisine}</option>`).join("");
      let statusRows = [];
      let partnerOrders = [];
      let partnerFeedbacks = [];

      function partnerPhone() {
        return cleanPhone($("dashboardPhone").value || $("statusPhone").value || localStorage.getItem("rkPartnerPhone") || "");
      }

      function rowMatchesPartner(row, phone) {
        if (!phone) return false;
        return [row.phone, row.supplierPhone, row.partnerPhone].some((value) => cleanPhone(value) === phone);
      }

      function orderMatchesPartner(order, phone) {
        if (!phone) return false;
        const direct = [order.supplierPhone, order.partnerPhone].some((value) => cleanPhone(value) === phone);
        const lineMatch = (order.items || []).some((line) => {
          const source = String(line.fulfillmentSource || line.source || "").toLowerCase();
          return source === "partner" && [line.supplierPhone, line.partnerPhone, line.phone].some((value) => cleanPhone(value) === phone);
        });
        const knownName = statusRows.find((row) => rowMatchesPartner(row, phone))?.restaurantName || "";
        const nameMatch = knownName && (order.items || []).some((line) => String(line.supplierName || line.partnerName || "").toLowerCase() === knownName.toLowerCase());
        return direct || lineMatch || nameMatch;
      }

      function visiblePartnerOrders() {
        const phone = partnerPhone();
        return partnerOrders.filter((order) => orderMatchesPartner(order, phone));
      }

      function visiblePartnerFeedbacks() {
        const orders = visiblePartnerOrders();
        const ids = new Set(orders.map((order) => String(order.id)));
        return partnerFeedbacks.filter((fb) => ids.has(String(fb.orderId || "")) || orders.some((order) => String(order.orderNo || "") === String(fb.orderNo || "")));
      }

      function partnerName() {
        const phone = partnerPhone();
        return statusRows.find((row) => rowMatchesPartner(row, phone))?.restaurantName || statusRows.find((row) => rowMatchesPartner(row, phone))?.supplierName || phone || "RK Partner";
      }

      function renderDashboard() {
        const phone = partnerPhone();
        if (!phone) {
          $("partnerDashboardMetrics").innerHTML = "";
          $("partnerDashboardList").innerHTML = `<div class="empty">Enter partner phone to load restaurant orders and feedback.</div>`;
          return;
        }
        const orders = visiblePartnerOrders();
        const feedbacks = visiblePartnerFeedbacks();
        const cancelled = orders.filter((order) => String(order.status || "").toLowerCase() === "cancelled");
        const refunds = feedbacks.filter((fb) => Number(fb.refundAmount || 0) > 0 || String(fb.status || "").toLowerCase().includes("refund"));
        $("partnerDashboardMetrics").innerHTML = [
          ["Active Orders", orders.filter((order) => !["delivered", "cancelled"].includes(String(order.status || "").toLowerCase())).length],
          ["Complaints", feedbacks.length],
          ["Refunds", refunds.length],
          ["Cancelled", cancelled.length]
        ].map(([label, value]) => `<div class="metric"><b>${value}</b><span>${label}</span></div>`).join("");
        const orderCards = orders.map((order) => {
          const status = String(order.status || "new").toLowerCase();
          return `<div class="item ${["new", "restaurant-accepted", "restaurant-preparing", "restaurant-handover"].includes(status) ? "urgent-item" : ""}">
            <div class="row between"><h3>${escapeHtml(order.orderNo || order.id)}</h3>${statusBadge(order.status || "new")}</div>
            <p>${escapeHtml(order.customer?.name || "")} | ${escapeHtml(order.customer?.phone || "")} | PNR ${escapeHtml(order.pnr || order.customer?.pnr || "")}</p>
            <p>Train ${escapeHtml(order.train || "")}${order.trainName ? ` - ${escapeHtml(order.trainName)}` : ""} | ${escapeHtml(order.coach || "")}/${escapeHtml(order.seat || "")} | ${escapeHtml(order.deliveryWindow || "")}</p>
            <p>${(order.items || []).filter((line) => String(line.fulfillmentSource || "").toLowerCase() === "partner").map((line) => `${escapeHtml(line.name)} x ${Number(line.qty || 0)}`).join(", ") || (order.items || []).map((line) => `${escapeHtml(line.name)} x ${Number(line.qty || 0)}`).join(", ")}</p>
            ${status === "restaurant-handover" ? `<div class="ack danger-soft" style="margin-top:10px;"><b>Rake Manager OTP:</b> ${escapeHtml(order.supplierHandoverOtp || "")}. Collect this OTP from rake manager after physical handover.</div>` : ""}
            <div class="row wrap" style="margin-top:10px;">
              ${status === "new" ? `<button class="btn" data-partner-accept-order="${order.id}"><i data-lucide="check"></i> Accept Restaurant Order</button>` : ""}
              ${["accepted", "preparing", "restaurant-accepted", "restaurant-preparing"].includes(status) ? `<button class="btn secondary" data-partner-ready-order="${order.id}"><i data-lucide="package-check"></i> Ready for Rake Manager</button>` : ""}
              ${status === "restaurant-handover" ? `<button class="btn" data-partner-complete-handover="${order.id}"><i data-lucide="key-round"></i> Close Handover with OTP</button>` : ""}
            </div>
          </div>`;
        });
        const feedbackCards = feedbacks.map((fb) => `<div class="item ${fb.ratingAlert ? "urgent-item" : ""}">
          <div class="row between"><h3>${escapeHtml(fb.orderNo || fb.orderId || fb.id)}</h3>${statusBadge(fb.status || "open")}</div>
          <p>${escapeHtml(fb.customer?.name || "")} | ${escapeHtml(fb.customer?.phone || "")} | Train ${escapeHtml(fb.customer?.train || fb.train || "")}</p>
          <p><b>Ratings:</b> Food ${escapeHtml(fb.foodRating || "-")}/10 | Delivery ${escapeHtml(fb.deliveryRating || "-")}/10 | Overall ${escapeHtml(fb.overallRating || fb.rating || "-")}/10</p>
          <p>${escapeHtml(fb.message || fb.feedback || "")}</p>
          ${fb.proof?.dataUrl ? `<div class="media-proof">${String(fb.proof.type || "").startsWith("image/") ? `<img class="proof-img" src="${fb.proof.dataUrl}" alt="Customer proof">` : ""}</div>` : ""}
          ${Number(fb.refundAmount || 0) > 0 ? `<div class="ack danger-soft" style="margin-top:10px;">Refund recorded: ${money(Number(fb.refundAmount || 0))}</div>` : ""}
          <div class="row mobile-stack" style="margin-top:10px;">
            <input class="input grow" placeholder="Private remark for rake manager and customer care" value="${escapeHtml(fb.supplierRemark || "")}" data-partner-feedback-remark="${fb.id}">
            <button class="btn secondary" data-partner-save-feedback="${fb.id}"><i data-lucide="save"></i> Save Remark</button>
          </div>
        </div>`);
        $("partnerDashboardList").innerHTML = [...orderCards, ...feedbackCards].join("") || `<div class="empty success">No restaurant order, complaint, refund or cancellation for this partner right now.</div>`;
        lucide.createIcons();
      }

      $("partnerForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = event.currentTarget;
        const data = getForm(form);
        const phone = cleanPhone(data.phone);
        if (phone.length !== 10) return toast("Enter valid 10 digit phone.");
        setSubmitState(form, "saving", "Submitting...");
        try {
          await compatAdd("partners", "partner", {
            ...data,
            phone,
            status: "pending",
            source: "partner-app",
            createdAt: FieldValue.serverTimestamp(),
            updatedAt: FieldValue.serverTimestamp()
          });
          localStorage.setItem("rkPartnerPhone", phone);
          $("statusPhone").value = phone;
          $("dashboardPhone").value = phone;
          form.reset();
          finishSubmitState(form, "Submitted");
          toast("Partner request sent to Control Tower.");
        } catch (error) {
          console.error(error);
          setSubmitState(form, "idle");
          toast(firebaseAccessMessage("partners", error));
        }
      });

      $("catalogForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = event.currentTarget;
        const data = getForm(form);
        const phone = cleanPhone(data.partnerPhone);
        if (phone.length !== 10) return toast("Enter partner phone used for enlistment.");
        const selectedMealSlots = [...form.querySelectorAll("[name='mealSlots']:checked")].map((box) => box.value);
        if (!selectedMealSlots.length) return toast("Choose at least one meal category.");
        setSubmitState(form, "saving", "Submitting...");
        try {
          const image = await compressImage(form.itemImageFile.files[0], 520, 0.7);
          await compatAdd("catalogRequests", "catalogRequest", {
            name: data.name,
            category: selectedMealSlots[0],
            mealSlots: selectedMealSlots,
            type: data.type,
            cuisine: data.cuisine,
            sellingPrice: Number(data.sellingPrice || 0),
            costPrice: Number(data.costPrice || 0),
            stockQty: Number(data.stockQty || 0),
            linkedTrain: data.linkedTrain || "All",
            description: data.description || "",
            itemImage: image,
            sourceType: "partner",
            source: "partner",
            supplierPhone: phone,
            supplierName: phone,
            status: "pending",
            createdAt: FieldValue.serverTimestamp(),
            updatedAt: FieldValue.serverTimestamp()
          });
          localStorage.setItem("rkPartnerPhone", phone);
          $("dashboardPhone").value = phone;
          form.reset();
          document.querySelectorAll("#partnerMealSlots input").forEach((box, idx) => { box.checked = idx === 0; });
          finishSubmitState(form, "Submitted");
          toast("Catalog request sent for quality approval.");
        } catch (error) {
          console.error(error);
          setSubmitState(form, "idle");
          toast(firebaseAccessMessage("catalogRequests", error));
        }
      });

      function renderStatus(rows) {
        statusRows = rows;
        $("statusList").innerHTML = rows.map((row) => {
          const isCatalog = Boolean(row.name);
          const returned = ["returned", "rejected"].includes(String(row.status || "").toLowerCase()) && isCatalog;
          const slots = row.mealSlots?.length ? row.mealSlots : [row.category || "Other"];
          return `
          <div class="item">
            <div class="row between"><h3>${escapeHtml(row.restaurantName || row.name || row.id)}</h3>${statusBadge(row.status || "pending")}</div>
            <p>${escapeHtml(row.station || row.category || "")} | ${escapeHtml(row.rejectionReason || row.description || "")}</p>
            ${row.cuisine ? `<p><b>Cuisine:</b> ${escapeHtml(row.cuisine)}</p>` : ""}
            ${row.reworkRemarks ? `<div class="ack danger-soft" style="margin-top:10px;"><b>Control Tower Rework:</b> ${escapeHtml(row.reworkRemarks)}</div>` : ""}
            ${returned ? `
              <div class="grid two" style="margin-top:10px;">
                <label class="field"><span>Item</span><input class="input" value="${escapeHtml(row.name || "")}" data-status-edit="${row.id}" data-field="name"></label>
                <label class="field"><span>Selling Rate</span><input class="input" type="number" value="${Number(row.sellingPrice || 0)}" data-status-edit="${row.id}" data-field="sellingPrice"></label>
                <label class="field"><span>Cost Rate</span><input class="input" type="number" value="${Number(row.costPrice || 0)}" data-status-edit="${row.id}" data-field="costPrice"></label>
                <label class="field"><span>Opening Qty</span><input class="input" type="number" value="${Number(row.stockQty || 0)}" data-status-edit="${row.id}" data-field="stockQty"></label>
                <label class="field"><span>Cuisine</span><select class="select" data-status-edit="${row.id}" data-field="cuisine">
                  ${cuisineOptions.map((cuisine) => `<option value="${escapeHtml(cuisine)}" ${String(row.cuisine || "North Indian") === cuisine ? "selected" : ""}>${escapeHtml(cuisine)}</option>`).join("")}
                </select></label>
                <label class="field" style="grid-column:1/-1;"><span>Meal Categories</span><div class="check-grid">
                  ${mealSlots.map((slot) => `<label class="check-pill"><input type="checkbox" value="${escapeHtml(slot)}" data-status-meal="${row.id}" ${slots.includes(slot) ? "checked" : ""}> ${escapeHtml(slot)}</label>`).join("")}
                </div></label>
                <label class="field" style="grid-column:1/-1;"><span>Product Detail</span><textarea class="textarea" data-status-edit="${row.id}" data-field="description">${escapeHtml(row.description || "")}</textarea></label>
              </div>
              <div class="row wrap" style="margin-top:10px;">
                <button class="btn" data-resubmit-catalog="${row.id}"><i data-lucide="send"></i> Resend Request</button>
                <button class="btn danger" data-delete-catalog-request="${row.id}"><i data-lucide="trash-2"></i> Delete Request</button>
              </div>` : ""}
          </div>`;
        }).join("") || `<div class="empty">No request found for this phone number.</div>`;
        lucide.createIcons();
      }

      $("statusList").addEventListener("click", async (event) => {
        const resend = event.target.closest("[data-resubmit-catalog]");
        const del = event.target.closest("[data-delete-catalog-request]");
        if (resend) {
          const row = statusRows.find((entry) => entry.id === resend.dataset.resubmitCatalog);
          const field = (name) => document.querySelector(`[data-status-edit="${row.id}"][data-field="${name}"]`)?.value || "";
          const slots = [...document.querySelectorAll(`[data-status-meal="${row.id}"]:checked`)].map((box) => box.value);
          if (!slots.length) return toast("Choose at least one meal category.");
          await compatUpdate(row, "catalogRequests", {
            name: field("name"),
            category: slots[0],
            mealSlots: slots,
            sellingPrice: Number(field("sellingPrice") || 0),
            costPrice: Number(field("costPrice") || 0),
            stockQty: Number(field("stockQty") || 0),
            cuisine: field("cuisine") || "North Indian",
            description: field("description"),
            status: "resubmitted",
            resubmittedAt: FieldValue.serverTimestamp()
          });
          toast("Catalog request resent to Control Tower.");
        }
        if (del) {
          const row = statusRows.find((entry) => entry.id === del.dataset.deleteCatalogRequest);
          if (!row || !confirm("Withdraw this catalog request?")) return;
          await compatUpdate(row, "catalogRequests", {
            status: "withdrawn",
            withdrawnAt: FieldValue.serverTimestamp()
          });
          toast("Catalog request withdrawn.");
        }
      });

      $("loadStatusBtn").addEventListener("click", async () => {
        const phone = cleanPhone($("statusPhone").value);
        if (phone.length !== 10) return toast("Enter valid 10 digit phone.");
        localStorage.setItem("rkPartnerPhone", phone);
        $("dashboardPhone").value = phone;
        try {
          const partnerSnap = await db.collection("partners").where("phone", "==", phone).get();
          const catalogSnap = await db.collection("catalogRequests").where("supplierPhone", "==", phone).get();
          renderStatus([
            ...partnerSnap.docs.map((doc) => ({ id: doc.id, ...doc.data() })),
            ...catalogSnap.docs.map((doc) => ({ id: doc.id, ...doc.data() }))
          ]);
          renderDashboard();
        } catch (error) {
          const partnerSnap = await db.collection("systemSettings").where("type", "==", "partner").get();
          const catalogSnap = await db.collection("systemSettings").where("type", "==", "catalogRequest").get();
          renderStatus([
            ...partnerSnap.docs.map((doc) => ({ id: doc.id, ...doc.data() })).filter((row) => cleanPhone(row.phone) === phone),
            ...catalogSnap.docs.map((doc) => ({ id: doc.id, ...doc.data() })).filter((row) => cleanPhone(row.supplierPhone) === phone)
          ]);
          renderDashboard();
        }
      });
      $("loadDashboardBtn").addEventListener("click", () => {
        const phone = partnerPhone();
        if (phone.length !== 10) return toast("Enter valid 10 digit phone.");
        localStorage.setItem("rkPartnerPhone", phone);
        $("statusPhone").value = phone;
        renderDashboard();
      });
      $("partnerDashboardList").addEventListener("click", async (event) => {
        const accept = event.target.closest("[data-partner-accept-order]");
        const ready = event.target.closest("[data-partner-ready-order]");
        const complete = event.target.closest("[data-partner-complete-handover]");
        const save = event.target.closest("[data-partner-save-feedback]");
        if (accept) {
          await db.collection("customerOrders").doc(accept.dataset.partnerAcceptOrder).update({
            status: "restaurant-accepted",
            supplierHandoverRole: "partner",
            supplierName: partnerName(),
            supplierPhone: partnerPhone(),
            statusLog: FieldValue.arrayUnion({ status: "restaurant-accepted", at: new Date().toISOString(), note: "Accepted by RK Partner" }),
            updatedAt: FieldValue.serverTimestamp()
          });
          toast("Restaurant order accepted.");
        }
        if (ready) {
          const order = partnerOrders.find((entry) => entry.id === ready.dataset.partnerReadyOrder);
          await db.collection("customerOrders").doc(ready.dataset.partnerReadyOrder).update({
            status: "restaurant-handover",
            supplierHandoverOtp: order?.supplierHandoverOtp || String(Math.floor(100000 + Math.random() * 900000)),
            supplierHandoverRole: "partner",
            supplierName: partnerName(),
            supplierPhone: partnerPhone(),
            partnerReadyAt: FieldValue.serverTimestamp(),
            statusLog: FieldValue.arrayUnion({ status: "restaurant-handover", at: new Date().toISOString(), note: "RK Partner is ready to hand over to rake manager" }),
            updatedAt: FieldValue.serverTimestamp()
          });
          toast("Order marked ready for rake manager handover. OTP is visible in Rake Manager App.");
        }
        if (complete) {
          const order = partnerOrders.find((entry) => entry.id === complete.dataset.partnerCompleteHandover);
          const otp = prompt("Enter OTP shown on Rake Manager App");
          if (!otp || String(otp).trim() !== String(order?.supplierHandoverOtp || "")) return toast("OTP does not match.");
          await db.collection("customerOrders").doc(order.id).update({
            status: "supplier-delivered-to-rake",
            supplierHandoverOtpStatus: "verified",
            supplierDeliveredToRakeAt: FieldValue.serverTimestamp(),
            statusLog: FieldValue.arrayUnion({ status: "supplier-delivered-to-rake", at: new Date().toISOString(), note: "RK Partner completed handover to rake manager" }),
            updatedAt: FieldValue.serverTimestamp()
          });
          toast("Handover closed. Rake manager can now assign passenger delivery.");
        }
        if (save) {
          const note = document.querySelector(`[data-partner-feedback-remark="${save.dataset.partnerSaveFeedback}"]`)?.value.trim() || "";
          await db.collection("feedbacks").doc(save.dataset.partnerSaveFeedback).update({
            supplierRemark: note,
            supplierRemarkBy: partnerName(),
            supplierRemarkVisibleToCustomer: false,
            supplierRemarkAt: FieldValue.serverTimestamp(),
            updatedAt: FieldValue.serverTimestamp()
          });
          toast("Private partner remark saved for Rake Manager and Customer Care.");
        }
      });
      $("switchOffPartnerBtn").addEventListener("click", async () => {
        const phone = cleanPhone($("statusPhone").value || localStorage.getItem("rkPartnerPhone"));
        if (phone.length !== 10) return toast("Enter partner phone first.");
        const reason = prompt("Reason for switching off restaurant service", "Restaurant temporarily unavailable.");
        if (!reason) return;
        await db.collection("serviceSwitches").doc(`partner__${phone}`).set({
          active: false,
          app: "partner-app",
          sourceType: "partner",
          supplierPhone: phone,
          phone,
          name: statusRows.find((row) => cleanPhone(row.phone || row.supplierPhone) === phone)?.restaurantName || phone,
          reason,
          updatedAt: FieldValue.serverTimestamp(),
          createdAt: FieldValue.serverTimestamp()
        }, { merge: true });
        toast("Restaurant service switched off and Control Tower notified.");
      });
      $("statusPhone").value = localStorage.getItem("rkPartnerPhone") || "";
      $("dashboardPhone").value = localStorage.getItem("rkPartnerPhone") || "";
      onLive("customerOrders", (rows) => { partnerOrders = rows; renderDashboard(); }, "createdAt", "desc", 250);
